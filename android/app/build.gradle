plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.codelink.medife"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17  // 수정: Java 17 사용
        targetCompatibility = JavaVersion.VERSION_17  // 수정: Java 17 사용
        coreLibraryDesugaringEnabled true   // ✅ desugaring 켜기
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17  // 수정: Java 17 사용
    }

//    ndkVersion "29.0.13113456"
    ndkVersion = "27.0.12077973"

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.codelink.medife"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}
dependencies {
    implementation("com.google.mlkit:text-recognition-korean:16.0.1")
    // ✅ desugar JDK 라이브러리 추가 (버전 2.0.4~2.x 사용 권장)
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    // Firebase BOM (버전 관리는 BOM에 맡김)
    implementation platform('com.google.firebase:firebase-bom:32.2.0')
    implementation 'com.google.firebase:firebase-messaging'
}


flutter {
    source = "../.."
}

apply plugin: 'com.google.gms.google-services'

